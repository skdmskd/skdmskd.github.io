<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Modular Starship - Linked List Game</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 10; left: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 10; left: 10; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Modular Starship</h1>
        <p>부품 개수: <span id="partsCount">1</span></p>
        <p>점수: <span id="score">0</span></p>
    </div>
    <div class="controls">이동: 마우스 | 발사: 클릭 (자동) | 빨간색 적을 피하고 파란색 파츠를 수집하세요!</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const partsCountUI = document.getElementById('partsCount');
const scoreUI = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let mouse = { x: canvas.width/2, y: canvas.height/2 };

// --- 연결리스트 노드 클래스 (우주선 파츠) ---
class ShipPart {
    constructor(isCore = false) {
        this.isCore = isCore;
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = isCore ? 20 : 15;
        this.color = isCore ? '#00fbff' : '#00ff88';
        this.next = null; // 연결리스트의 Next 포인터
        this.angle = 0;
    }

    update(targetX, targetY) {
        // 부드러운 따라가기 로직 (연결리스트의 이전 노드를 추적)
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const followDist = this.isCore ? 0 : 35; // 마디 사이의 간격

        if (distance > followDist) {
            this.x += dx * 0.15;
            this.y += dy * 0.15;
        }

        if (this.next) {
            this.next.update(this.x, this.y);
        }
    }

    draw() {
        // 연결선 그리기
        if (this.next) {
            ctx.beginPath();
            ctx.strokeStyle = '#333';
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.next.x, this.next.y);
            ctx.stroke();
            this.next.draw();
        }

        // 노드(파츠) 그리기
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.stroke();
    }
}

// --- 게임 객체 관리 ---
let shipHead = new ShipPart(true); // Head Node
let enemies = [];
let items = [];

function spawnEnemy() {
    enemies.push({
        x: Math.random() * canvas.width,
        y: -20,
        speed: 2 + Math.random() * 3,
        size: 10 + Math.random() * 15
    });
}

function spawnItem() {
    items.push({
        x: Math.random() * canvas.width,
        y: -20,
        speed: 2
    });
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 우주선(연결리스트) 업데이트
    shipHead.update(mouse.x, mouse.y);
    shipHead.draw();

    // 2. 적 업데이트 및 충돌 검사 (연결리스트 절단 핵심 로직)
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.y += e.speed;

        // 화면 밖으로 나가면 제거
        if (e.y > canvas.height) enemies.splice(i, 1);

        // 모든 노드와 충돌 체크
        let current = shipHead;
        let prev = null;
        while (current) {
            const dx = e.x - current.x;
            const dy = e.y - current.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < e.size + current.radius) {
                if (current.isCore) {
                    // 코어 충돌 시 게임 리셋
                    alert("코어 파괴! 최종 점수: " + score);
                    location.reload();
                } else {
                    // 중간 노드 충돌 시 해당 노드와 그 뒤를 모두 제거 (Singly Linked List의 특성)
                    if (prev) prev.next = null; 
                    enemies.splice(i, 1);
                    break;
                }
            }
            prev = current;
            current = current.next;
        }

        // 적 그리기
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fillStyle = "#ff4444";
        ctx.fill();
    }

    // 3. 아이템 수집 (노드 추가)
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        it.y += it.speed;

        const dx = it.x - shipHead.x;
        const dy = it.y - shipHead.y;
        if (Math.sqrt(dx*dx + dy*dy) < 30) {
            // 리스트의 맨 끝에 새로운 노드 추가 (Append)
            let current = shipHead;
            while (current.next) { current = current.next; }
            current.next = new ShipPart();
            
            items.splice(i, 1);
            score += 100;
        }

        // 아이템 그리기
        ctx.beginPath();
        ctx.rect(it.x-10, it.y-10, 20, 20);
        ctx.fillStyle = "#00ff88";
        ctx.fill();
    }

    // UI 업데이트
    let count = 0;
    let curr = shipHead;
    while(curr) { count++; curr = curr.next; }
    partsCountUI.innerText = count;
    scoreUI.innerText = score;

    requestAnimationFrame(update);
}

// 이벤트 리스너
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// 생성 타이머
setInterval(spawnEnemy, 600);
setInterval(spawnItem, 2000);

update();
</script>
</body>
</html>
